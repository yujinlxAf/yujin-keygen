<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yujin's Hub | Key Access</title>
    <style>
        body { background: #121216; color: #f0f0ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1c1c22; padding: 40px; border-radius: 12px; border: 1px solid #8a2be2; text-align: center; box-shadow: 0 0 30px rgba(138, 43, 226, 0.2); width: 320px; }
        h1 { color: #8a2be2; margin: 0 0 10px 0; font-size: 22px; letter-spacing: 1px; }
        p { color: #a0a0b0; font-size: 13px; margin-bottom: 25px; }
        #keyDisplay { background: #0c0c10; padding: 15px; border-radius: 8px; font-weight: bold; font-family: 'Courier New', monospace; margin-bottom: 15px; border: 1px solid #2d2d37; color: #00ffff; font-size: 18px; word-break: break-all; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; }
        .gen-btn { background: #8a2be2; color: white; }
        .gen-btn:hover { background: #a04ef6; transform: translateY(-2px); }
        .copy-btn { background: #2d2d37; color: #f0f0ff; border: 1px solid #454555; }
        .copy-btn:hover { background: #3d3d4d; }
        .status { font-size: 11px; margin-top: 10px; color: #57ff57; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="card">
        <h1>YUJIN TERMINAL</h1>
        <p>Generate your private access key</p>
        <div id="keyDisplay">---</div>
        <div class="btn-group">
            <button class="gen-btn" onclick="generateKey()">GENERATE KEY</button>
            <button class="copy-btn" onclick="copyKey()">COPY TO CLIPBOARD</button>
        </div>
        <div id="status" class="status">KEY COPIED!</div>
    </div>

    <script>
        function generateKey() {
            const chars = "ABCDEF0123456789";
            let random = "";
            for (let i = 0; i < 8; i++) {
                random += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const key = "YUJIN-" + random;
            document.getElementById('keyDisplay').innerText = key;
            document.getElementById('status').style.opacity = "0";
        }

        function copyKey() {
            const key = document.getElementById('keyDisplay').innerText;
            if (key === "---") return;
            navigator.clipboard.writeText(key);
            const status = document.getElementById('status');
            status.style.opacity = "1";
            setTimeout(() => { status.style.opacity = "0"; }, 2000);
        }
    </script>
</body>
</html>
