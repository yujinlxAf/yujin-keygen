<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUJIN // TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            font-family: 'Fira Code', monospace; color: #fff; background: #000; overflow: hidden; user-select: none;
        }

        /* Matrix Canvas */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.15; }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; z-index: 100; pointer-events: none;
        }

        #bootScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 50; display: flex; flex-direction: column; padding: 40px; box-sizing: border-box;
            color: #bc66ff; font-size: 14px; text-shadow: 0 0 5px #8a2be2;
        }

        .card { 
            position: relative; z-index: 10; background: rgba(10, 10, 15, 0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 12px; border: 1px solid rgba(138, 43, 226, 0.5); 
            text-align: center; box-shadow: 0 0 50px rgba(0, 0, 0, 1); 
            width: 340px; opacity: 0; transform: translateY(20px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card.visible { opacity: 1; transform: translateY(0); }

        .server-status { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 10px; color: #8892b0; margin-bottom: 20px; letter-spacing: 2px; }
        .ping { width: 8px; height: 8px; background: #00ffff; border-radius: 50%; box-shadow: 0 0 10px #00ffff; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        h1 { color: #fff; margin: 0 0 5px 0; font-size: 26px; letter-spacing: 4px; text-shadow: 0 0 20px rgba(138, 43, 226, 1); }
        p { color: #8892b0; font-size: 10px; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }

        #keyDisplay { 
            background: #050505; padding: 22px; border-radius: 4px; font-weight: 700; 
            margin-bottom: 25px; border: 1px solid #1a1a20; color: #00ffff; 
            font-size: 19px; letter-spacing: 2px; text-shadow: 0 0 12px rgba(0, 255, 255, 0.6);
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { border: none; padding: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: 'Fira Code', monospace; transition: 0.2s; font-size: 12px; letter-spacing: 2px; }

        .gen-btn { background: #8a2be2; color: white; border: 1px solid #bc66ff; }
        .gen-btn:hover { background: #bc66ff; box-shadow: 0 0 30px rgba(138, 43, 226, 0.5); transform: scale(1.02); }
        .copy-btn { background: transparent; color: #8892b0; border: 1px solid #333; }
        .copy-btn:hover { color: #fff; border-color: #00ffff; background: rgba(0, 255, 255, 0.05); }

        .status { font-size: 11px; margin-top: 15px; color: #00ffff; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="scanlines"></div>
    <div id="bootScreen"></div>

    <div class="card" id="mainCard">
        <div class="server-status"><div class="ping"></div>DATABASE: ONLINE</div>
        <h1>YUJIN // HUB</h1>
        <p>Verified Access Point</p>
        <div id="keyDisplay">INIT_HANDSHAKE</div>
        <div class="btn-group">
            <button class="gen-btn" onclick="triggerDecrypt()">DECRYPT KEY</button>
            <button class="copy-btn" onclick="copyKey()">COPY STRING</button>
        </div>
        <div id="status" class="status">STRING COPIED TO BUFFER</div>
    </div>

    <script>
        // --- Matrix Rain Logic ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#8a2be2"; // Purple rain
            ctx.font = fontSize + "px Fira Code";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // --- Auth & UI Logic ---
        let validKeys = [];
        let isDecrypting = false;

        window.onload = async function() {
            runBootSequence();
            try {
                const response = await fetch('keys.txt'); 
                const text = await response.text();
                validKeys = text.split('\n').map(key => key.trim()).filter(key => key.length > 0);
            } catch (e) { console.log("Offline mode"); }
        };

        async function runBootSequence() {
            const boot = document.getElementById('bootScreen');
            const lines = ["INITIALIZING...", "AUTH_LINK: STABLE", "FETCHING_DB...", "SUCCESS.", "WELCOME, YUJIN."];
            for (let l of lines) {
                const d = document.createElement('div'); d.innerText = "> " + l;
                boot.appendChild(d); await new Promise(r => setTimeout(r, 400));
            }
            boot.style.opacity = "0";
            setTimeout(() => { boot.style.display = "none"; document.getElementById('mainCard').classList.add('visible'); }, 800);
        }

        function triggerDecrypt() {
            if (validKeys.length === 0 || isDecrypting) return;
            isDecrypting = true;
            const display = document.getElementById('keyDisplay');
            const target = validKeys[Math.floor(Math.random() * validKeys.length)];
            let i = 0;
            const interval = setInterval(() => {
                display.innerText = target.split('').map((c, idx) => idx < i/2 ? target[idx] : "X#$%"[Math.floor(Math.random()*4)]).join('');
                if (i++ > 20) { clearInterval(interval); display.innerText = target; isDecrypting = false; }
            }, 40);
        }

        function copyKey() {
            const k = document.getElementById('keyDisplay').innerText;
            if (k.includes("INIT") || isDecrypting) return;
            navigator.clipboard.writeText(k);
            document.getElementById('status').style.opacity = "1";
            setTimeout(() => document.getElementById('status').style.opacity = "0", 2000);
        }
    </script>
</body>
</html>
